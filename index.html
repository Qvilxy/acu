<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <style>
        /* Сброс стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Чтобы не было скролла во время загрузки */
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        #loader-screen img {
            max-width: 80%;
            height: auto;
            /* Можно добавить легкую анимацию появления/пульсации при желании */
        }

        /* Класс для скрытия загрузчика */
        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
        #app-interface {
            display: none; /* Скрыт по умолчанию */
            width: 100%;
            min-height: 100vh;
            background-color: #ffffff; /* Полностью белый фон страницы */
        }

        /* Шапка */
        .header {
            height: 100px;
            width: 100%;
            /* Градиент из двух цветов */
            background: linear-gradient(45deg, #B255FF, #C177FF, #B255FF);
            background-size: 200% 200%;
            /* Анимация переливания */
            animation: gradientShift 3s ease infinite;
            
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* Легкая тень для объема, можно убрать */
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-logo {
            max-height: 80px; /* Ограничиваем высоту лого, чтобы влезало в шапку 100px */
            max-width: 90%;
            object-fit: contain;
        }

        /* Контентная часть (пустая, белая) */
        .content {
            padding: 20px;
            /* Здесь будет остальной контент приложения */
        }

    </style>
</head>
<body>

    <!-- Экран загрузки -->
    <div id="loader-screen">
        <img src="ballonrose.png" alt="Loading...">
    </div>

    <!-- Основной интерфейс -->
    <div id="app-interface">
        <!-- Шапка -->
        <header class="header">
            <img src="ballonygz.png" alt="Logo" class="header-logo">
        </header>

        <!-- Основное содержимое (пока пустое) -->
        <main class="content">
            <!-- Сюда можно добавлять блоки приложения -->
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const loader = document.getElementById('loader-screen');
            const appInterface = document.getElementById('app-interface');

            // Таймер на 3 секунды (3000 мс)
            setTimeout(() => {
                // Начинаем скрывать загрузчик
                loader.classList.add('hidden');
                
                // Показываем интерфейс
                appInterface.style.display = 'block';

                // Полностью удаляем загрузчик из DOM после завершения анимации исчезновения (0.5s)
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);

            }, 3000);
        });
    </script>
</body>
</html>
