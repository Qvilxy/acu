<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <style>
        /* Сброс стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        #loader-screen img {
            max-width: 80%;
            height: auto;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
        #app-interface {
            display: none;
            width: 100%;
            min-height: 100vh;
            background-color: #ffffff;
        }

        /* Шапка */
        .header {
            height: 100px;
            width: 100%;
            position: relative;
            overflow: hidden;
            
            /* Сложный градиент: Фиолетовый -> Светло-сиреневый -> Белый/Очень светлый -> Фиолетовый */
            background: linear-gradient(120deg, #8A2BE2, #E6E6FA, #F8F8FF, #9370DB, #8A2BE2);
            background-size: 300% 300%;
            /* Медленная анимация (8 секунд) */
            animation: complexGradientFlow 8s ease infinite;
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Анимация градиента: двигается по диагонали и меняет акценты */
        @keyframes complexGradientFlow {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }

        /* Слой зернистости (шума) */
        .header::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.07; /* Очень легкая зернистость */
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .header-logo {
            /* Базовый размер небольшой, чтобы при увеличении не было пикселизации сразу */
            max-height: 40px; 
            max-width: 40px;
            object-fit: contain;
            
            /* Увеличение в 4 раза и подъем ВВЕРХ на 15px */
            transform: scale(4) translateY(-15px);
            
            position: relative;
            z-index: 2; /* Поверх шума */
        }

        .content {
            padding: 20px;
        }

    </style>
</head>
<body>

    <!-- Экран загрузки -->
    <div id="loader-screen">
        <img src="ballonrose.png" alt="Loading...">
    </div>

    <!-- Основной интерфейс -->
    <div id="app-interface">
        <!-- Шапка -->
        <header class="header">
            <img src="ballonygz.png" alt="Logo" class="header-logo">
        </header>

        <!-- Основное содержимое -->
        <main class="content">
            <!-- Контент приложения -->
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const loader = document.getElementById('loader-screen');
            const appInterface = document.getElementById('app-interface');

            setTimeout(() => {
                loader.classList.add('hidden');
                appInterface.style.display = 'block';

                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);

            }, 3000);
