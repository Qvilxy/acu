<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <style>
        /* Сброс стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #fff;
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        #loader-screen img {
            max-width: 80%;
            height: auto;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
        #app-interface {
            display: none; /* Скрыт до конца загрузки */
            width: 100%;
            min-height: 100vh;
            background-color: #ffffff;
        }

        /* Шапка */
        .header {
            height: 100px;
            width: 100%;
            position: relative;
            overflow: hidden;
            
            /* Градиент: Фиолетовый -> Светлый -> Белый -> Светлый -> Фиолетовый */
            background: linear-gradient(115deg, #8A2BE2, #D8BFD8, #FFFFFF, #D8BFD8, #8A2BE2);
            background-size: 400% 400%;
            /* Очень медленная и плавная анимация */
            animation: smoothGradient 10s ease infinite;
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes smoothGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Слой зернистости (шума) - надежный способ через base64 паттерн */
        .header::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            opacity: 0.08; /* Прозрачность шума */
            pointer-events: none;
            z-index: 1;
            background-image: url('image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyBAMAAADsEZWCAAAAGFBMVEUAAAA5OTkAAABMTExERERmZmYzMzMyMjJ4Oy/6AAAACHRSTlMAMwA3M2Y3ZpkN1u8AAAAJcEhZcwAADsQAAA7EAZUrDhsAAABBSURBVDjL7dExAQAgDMCw/396C2Ww0CqT5Jx0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHT0EL8A1wX/AK11j68AAAAASUVORK5CYII=');
        }

        .header-logo {
            /* Базовый размер маленький */
            max-height: 40px; 
            max-width: 40px;
            object-fit: contain;
            
            /* Увеличение в 4 раза и подъем ВВЕРХ на 15px */
            transform: scale(4) translateY(-15px);
            
            position: relative;
            z-index: 2; /* Поверх шума */
        }

        .content {
            padding: 20px;
        }

    </style>
</head>
<body>

    <!-- Экран загрузки -->
    <div id="loader-screen">
        <img src="ballonrose.png" alt="Loading...">
    </div>

    <!-- Основной интерфейс -->
    <div id="app-interface">
        <!-- Шапка -->
        <header class="header">
            <img src="ballonygz.png" alt="Logo" class="header-logo">
        </header>

        <!-- Основное содержимое -->
        <main class="content">
            <!-- Контент приложения -->
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const loader = document.getElementById('loader-screen');
            const appInterface = document.getElementById('app-interface');

            // Функция завершения загрузки
            function finishLoading() {
                if (loader.style.display === 'none') return; // Уже скрыт

                loader.classList.add('hidden');
                appInterface.style.display = 'block';

                // Полностью убираем загрузчик из потока через полсекунды
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }

            // Запускаем таймер
            const loadTimer = setTimeout(finishLoading, 3000);

            // На случай ошибок, добавляем обработчик window.onload как запасной вариант
            window.addEventListener('load', () => {
                // Если вдруг DOMContentLoaded сработал, но картинки грузятся долго,
                // мы все равно ждем 3 секунды, но если 3 секунды прошло, то finishLoading уже сработал.
            });
        });
    </script>
</body>
</html>
